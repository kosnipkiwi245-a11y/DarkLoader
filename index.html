<!DOCTYPE html>
<html>
<head>
  <title>DarkLoader</title>
  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: Arial;
    }

    .navbar {
      background: #111;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      border-bottom: 2px solid red;
    }

    .logo {
      color: red;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      display: flex;
    }

    .sidebar {
      width: 200px;
      background: #0f0f0f;
      padding: 15px;
    }

    .content {
      flex: 1;
      padding: 20px;
    }

    .games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
    }

    .game {
      background: #111;
      padding: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .game:hover {
      transform: scale(1.05);
      border: 1px solid red;
    }

    .game img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .btn {
      background: red;
      padding: 10px;
      margin-top: 5px;
      text-align: center;
    }

    /* MODAL DETALLES */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: #111;
      padding: 20px;
      width: 400px;
      border: 1px solid red;
    }

    .close {
      float: right;
      cursor: pointer;
      color: red;
    }

  </style>
</head>

<body>

<div class="navbar">
  <div class="logo">🔥 DARKLOADER</div>
</div>

<div class="container">

  <div class="sidebar">
    <h3>EXPLORAR</h3>
    <a>Populares</a>
    <a>Acción</a>
    <a>RPG</a>
  </div>

  <div class="content">
    <h2>Juegos</h2>
    <div class="games" id="games"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="cerrar()">X</span>
    <h2 id="titulo"></h2>
    <p id="desc"></p>
    <p id="req"></p>
    <div class="btn">Descargar</div>
  </div>
</div>

<script>

const juegos = [
  {
    nombre: "DOOM Eternal",
    imagen: "https://cdn.cloudflare.steamstatic.com/steam/apps/782330/header.jpg",
    descripcion: "Shooter rápido y brutal contra demonios.",
    requisitos: "8GB RAM / GTX 1060"
  },
  {
    nombre: "Cyberpunk 2077",
    imagen: "https://cdn.cloudflare.steamstatic.com/steam/apps/1091500/header.jpg",
    descripcion: "RPG futurista en mundo abierto.",
    requisitos: "12GB RAM / GTX 1660"
  },
  {
    nombre: "Elden Ring",
    imagen: "https://cdn.cloudflare.steamstatic.com/steam/apps/1245620/header.jpg",
    descripcion: "RPG oscuro estilo Souls.",
    requisitos: "12GB RAM / GTX 1070"
  },
  {
    nombre: "GTA V",
    imagen: "https://cdn.cloudflare.steamstatic.com/steam/apps/271590/header.jpg",
    descripcion: "Mundo abierto criminal.",
    requisitos: "8GB RAM / GTX 660"
  },
  {
    nombre: "Minecraft",
    imagen: "https://upload.wikimedia.org/wikipedia/en/5/51/Minecraft_cover.png",
    descripcion: "Sandbox de construcción infinita.",
    requisitos: "4GB RAM"
  }
];

const contenedor = document.getElementById("games");

juegos.forEach((juego, index) => {
  contenedor.innerHTML += `
    <div class="game" onclick="abrir(${index})">
      <img src="${juego.imagen}">
      <h4>${juego.nombre}</h4>
    </div>
  `;
});

function abrir(i){
  document.getElementById("modal").style.display = "flex";
  document.getElementById("titulo").innerText = juegos[i].nombre;
  document.getElementById("desc").innerText = juegos[i].descripcion;
  document.getElementById("req").innerText = "Requisitos: " + juegos[i].requisitos;
}

function cerrar(){
  document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
