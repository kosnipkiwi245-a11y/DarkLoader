<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DarkLoader</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:white;
  font-family:Arial;
}

/* INICIO */
#inicio{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  flex-direction:column;
}

button{
  background:red;
  border:none;
  padding:12px;
  color:white;
  cursor:pointer;
  margin:5px;
}

/* LOGIN */
#login{
  display:none;
  text-align:center;
  margin-top:100px;
}

input{
  padding:10px;
  margin:5px;
}

/* APP */
#app{
  display:none;
}

.nav{
  background:#111;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,200px);
  gap:20px;
  padding:20px;
}

.card{
  background:#111;
  padding:10px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
}

/* DETALLE */
#detalle{
  display:none;
  padding:20px;
}
</style>
</head>

<body>

<!-- INICIO -->
<div id="inicio">
  <h1>🔥 DARKLOADER 🔥</h1>
  <button onclick="mostrarLogin()">Entrar</button>
</div>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="user" placeholder="Usuario"><br>
  <input id="pass" type="password" placeholder="Contraseña"><br>
  <button onclick="login()">Entrar</button>
  <button onclick="registro()">Registrarse</button>
</div>

<!-- APP -->
<div id="app">
  <div class="nav">
    <h2>DARKLOADER</h2>
    <button onclick="logout()">Salir</button>
  </div>

  <div class="grid" id="juegos"></div>
</div>

<!-- DETALLE -->
<div id="detalle"></div>

<script>

/* LOGIN */
function mostrarLogin(){
  inicio.style.display="none";
  login.style.display="block";
}

function registro(){
  localStorage.setItem("user", user.value);
  localStorage.setItem("pass", pass.value);
  alert("Registrado");
}

function login(){
  if(user.value==localStorage.getItem("user") &&
     pass.value==localStorage.getItem("pass")){
      login.style.display="none";
      app.style.display="block";
  }else{
    alert("Error");
  }
}

function logout(){
  location.reload();
}

/* 🎮 LISTA DE JUEGOS */
const juegos=[
{
nombre:"DOOM Eternal",
img:"https://cdn.cloudflare.steamstatic.com/steam/apps/782330/header.jpg",
desc:"Shooter brutal contra demonios en Marte y la Tierra.",
req:"8GB RAM / GTX 1060",
peso:"50GB"
},
{
nombre:"GTA V",
img:"https://cdn.cloudflare.steamstatic.com/steam/apps/271590/header.jpg",
desc:"Mundo abierto criminal con historia y online.",
req:"8GB RAM / GTX 660",
peso:"100GB"
},
{
nombre:"Minecraft",
img:"https://cdn.cloudflare.steamstatic.com/steam/apps/12900/header.jpg",
desc:"Juego sandbox de construcción infinito.",
req:"4GB RAM",
peso:"1GB"
},
{
nombre:"Cyberpunk 2077",
img:"https://cdn.cloudflare.steamstatic.com/steam/apps/1091500/header.jpg",
desc:"RPG futurista en Night City.",
req:"12GB RAM / RTX",
peso:"70GB"
},
{
nombre:"Elden Ring",
img:"https://cdn.cloudflare.steamstatic.com/steam/apps/1245620/header.jpg",
desc:"RPG oscuro de mundo abierto tipo Souls.",
req:"12GB RAM / GTX 1060",
peso:"60GB"
},
{
nombre:"Call of Duty Warzone",
img:"https://cdn.cloudflare.steamstatic.com/steam/apps/1962663/header.jpg",
desc:"Battle royale masivo y competitivo.",
req:"16GB RAM",
peso:"120GB"
},
{
nombre:"Red Dead Redemption 2",
img:"https://cdn.cloudflare.steamstatic.com/steam/apps/1174180/header.jpg",
desc:"Historia épica del viejo oeste.",
req:"12GB RAM",
peso:"120GB"
},
{
nombre:"Fortnite",
img:"https://cdn.cloudflare.steamstatic.com/steam/apps/12210/header.jpg",
desc:"Battle royale con construcción.",
req:"8GB RAM",
peso:"30GB"
}
];

const cont=document.getElementById("juegos");

/* MOSTRAR JUEGOS */
juegos.forEach(j=>{
  cont.innerHTML+=`
  <div class="card" onclick="verJuego('${j.nombre}')">
    <img src="${j.img}">
    <p>${j.nombre}</p>
  </div>
  `;
});

/* DETALLE */
function verJuego(nombre){
  const j=juegos.find(x=>x.nombre===nombre);

  app.style.display="none";
  detalle.style.display="block";

  detalle.innerHTML=`
  <button onclick="volver()">⬅ Volver</button>
  <h1>${j.nombre}</h1>
  <img src="${j.img}" width="400">
  <p>${j.desc}</p>
  <p><b>Requisitos:</b> ${j.req}</p>
  <p><b>Peso:</b> ${j.peso}</p>
  <button onclick="alert('Función de descarga futura 😎')">Descargar</button>
  `;
}

function volver(){
  detalle.style.display="none";
  app.style.display="block";
}

</script>

</body>
</html>
