<!DOCTYPE html>
<html>
<head>
  <title>DarkLoader</title>
  <style>
    body {
      margin: 0;
      background: #0b0b0b;
      color: white;
      font-family: Arial;
    }

    /* NAVBAR */
    .navbar {
      background: #111;
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid red;
    }

    .logo {
      color: red;
      font-size: 22px;
      font-weight: bold;
    }

    .menu a {
      color: white;
      margin: 0 10px;
      text-decoration: none;
    }

    .menu a:hover {
      color: red;
    }

    /* LAYOUT */
    .container {
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 200px;
      background: #0f0f0f;
      padding: 15px;
      border-right: 1px solid #222;
    }

    .sidebar h3 {
      color: red;
      font-size: 14px;
    }

    .sidebar a {
      display: block;
      color: #ccc;
      text-decoration: none;
      margin: 5px 0;
    }

    .sidebar a:hover {
      color: red;
    }

    /* CONTENT */
    .content {
      flex: 1;
      padding: 20px;
    }

    /* HERO */
    .hero {
      background: url("https://images.unsplash.com/photo-1605902711622-cfb43c4437d1") center/cover;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
      border: 1px solid #222;
    }

    /* GAMES GRID */
    .games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .game {
      background: #111;
      padding: 10px;
      border: 1px solid #222;
      text-align: center;
      transition: 0.2s;
    }

    .game:hover {
      transform: scale(1.05);
      border-color: red;
    }

    .game img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .btn {
      background: red;
      padding: 10px;
      display: inline-block;
      margin-top: 5px;
      cursor: pointer;
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">🔥 DARKLOADER</div>
  <div class="menu">
    <a href="#">Tienda</a>
    <a href="#">Biblioteca</a>
    <a href="#">Comunidad</a>
  </div>
</div>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>EXPLORAR</h3>
    <a href="#">Populares</a>
    <a href="#">Gratis</a>
    <a href="#">Acción</a>
    <a href="#">RPG</a>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="hero">
      🔥 JUEGO DESTACADO 🔥
    </div>

    <h2>Juegos</h2>

    <div class="games" id="games"></div>

  </div>
</div>

<script>
const juegos = [
  {
    nombre: "DOOM Eternal",
    imagen: "https://cdn.cloudflare.steamstatic.com/steam/apps/782330/header.jpg"
  },
  {
    nombre: "Cyberpunk 2077",
    imagen: "https://cdn.cloudflare.steamstatic.com/steam/apps/1091500/header.jpg"
  },
  {
    nombre: "Elden Ring",
    imagen: "https://cdn.cloudflare.steamstatic.com/steam/apps/1245620/header.jpg"
  }
];

const contenedor = document.getElementById("games");

juegos.forEach(juego => {
  contenedor.innerHTML += `
    <div class="game">
      <img src="${juego.imagen}">
      <h4>${juego.nombre}</h4>
      <div class="btn">Descargar</div>
    </div>
  `;
});
</script>

</body>
</html>
